name: Build and publish release image

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4.3.1
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set package version from release tag
        env:
          RELEASE_TAG: ${{ gitea.ref_name }}
        run: uv version "${RELEASE_TAG#v}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.PACKAGES_REGISTRY_URL }}
          username: ${{ vars.ACTIONS_USERNAME }}
          password: ${{ secrets.ACTIONS_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ vars.PACKAGES_REGISTRY_URL }}/${{ gitea.repository }}:${{ gitea.ref_name }}
            ${{ vars.PACKAGES_REGISTRY_URL }}/${{ gitea.repository }}:latest
